{{- if .Values.rbac.create -}}
kind: Role
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: {{ template "chartreuse.fullname" . }}
  labels:
    {{- include "chartreuse.labels" . | nindent 4 }}
  {{- with (include "chartreuse.dependencyAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
rules:
  - apiGroups: [""]
    resources: ["replicationcontrollers/scale"]
    verbs: ["get", "list", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["list"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["list", "patch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "update", "create", "delete"]
  - apiGroups: ["extensions"]
    resources: ["deployments/scale", "replicasets/scale"]
    verbs: ["get", "list", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale", "replicasets/scale"]
    verbs: ["get", "list", "update", "patch"]
  # patch on deployments: stop_pods/restore_stopped_pods track stopped Deployments via an annotation
  - apiGroups: ["extensions"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["wiremind.io"]
    resources: ["expecteddeploymentscales"]
    verbs: ["get", "list"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ template "chartreuse.fullname" . }}
  labels:
    {{- include "chartreuse.labels" . | nindent 4 }}
  {{- with (include "chartreuse.dependencyAnnotations" .) }}
  annotations:
    {{- . | nindent 4 }}
  {{- end }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ template "chartreuse.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ template "chartreuse.fullname" . }}
    namespace: {{ .Release.Namespace }}

{{- end -}}
