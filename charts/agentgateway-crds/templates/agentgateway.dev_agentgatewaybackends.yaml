---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
    app: agentgateway
    app.kubernetes.io/name: agentgateway
  name: agentgatewaybackends.agentgateway.dev
spec:
  group: agentgateway.dev
  names:
    categories:
    - agentgateway
    kind: AgentgatewayBackend
    listKind: AgentgatewayBackendList
    plural: agentgatewaybackends
    shortNames:
    - agbe
    singular: agentgatewaybackend
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Backend configuration acceptance status
      jsonPath: .status.conditions[?(@.type=='Accepted')].status
      name: Accepted
      type: string
    - description: The age of the backend.
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Desired backend configuration.
            properties:
              a2a:
                description: A2A backend.
                properties:
                  host:
                    description: Hostname or IP address of the A2A backend.
                    maxLength: 256
                    minLength: 1
                    type: string
                  port:
                    description: Port number of the A2A backend.
                    format: int32
                    maximum: 65535
                    minimum: 1
                    type: integer
                required:
                - host
                - port
                type: object
              ai:
                description: LLM backend.
                properties:
                  groups:
                    description: "Groups in priority order, where each group\ndefines
                      a set of LLM providers. The priority determines the priority
                      of\nthe backend endpoints chosen.\nNote: provider names must
                      be unique across all providers in all priority\ngroups. Backend
                      policies may target a specific provider by name using\n`targetRefs[].sectionName`.\n\nExample
                      configuration with two priority groups:\n\n\tgroups:\n\t- providers:\n\t
                      \ - azureopenai:\n\t      deploymentName: gpt-4o-mini\n\t      apiVersion:
                      2024-02-15-preview\n\t      endpoint: ai-gateway.openai.azure.com\n\t-
                      providers:\n\t  - azureopenai:\n\t      deploymentName: gpt-4o-mini-2\n\t
                      \     apiVersion: 2024-02-15-preview\n\t      endpoint: ai-gateway-2.openai.azure.com\n\t
                      \    policies:\n\t       auth:\n\t         secretRef:\n\t           name:
                      azure-secret"
                    items:
                      properties:
                        providers:
                          description: |-
                            LLM providers within this group. Each provider is treated equally in terms of priority,
                            with automatic weighting based on health.
                          items:
                            properties:
                              anthropic:
                                description: Anthropic provider settings.
                                properties:
                                  model:
                                    description: |-
                                      Model name override, such as `gpt-4o-mini`.
                                      If unset, the model name is taken from the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                type: object
                              azure:
                                description: |-
                                  Azure provider with resource-based configuration.
                                  Supports both Azure OpenAI and Azure AI Foundry resource types.
                                properties:
                                  apiVersion:
                                    description: |-
                                      The version of the Azure OpenAI API to use.
                                      If unset, defaults to `v1`.
                                    maxLength: 64
                                    minLength: 1
                                    type: string
                                  model:
                                    description: |-
                                      Model name override, such as `gpt-4o-mini`.
                                      If unset, the model name is taken from the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                  projectName:
                                    description: |-
                                      The Foundry project name, required when `resourceType` is `Foundry`.
                                      Used to construct paths: /api/projects/{projectName}/openai/v1/...
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                  resourceName:
                                    description: |-
                                      The Azure resource name used to construct the endpoint host.
                                      For OpenAI: {resourceName}.openai.azure.com
                                      For Foundry: {resourceName}.services.ai.azure.com
                                      Note: when the Azure portal "Foundry legacy" template was used, the
                                      generated resource name may end in "-resource" (e.g. "myproject-resource");
                                      that suffix is part of the resource name as the user configured it, not
                                      part of the hostname suffix agentgateway should append.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                  resourceType:
                                    description: The type of Azure endpoint. Determines
                                      the host suffix.
                                    enum:
                                    - Foundry
                                    - OpenAI
                                    type: string
                                required:
                                - resourceName
                                - resourceType
                                type: object
                                x-kubernetes-validations:
                                - message: projectName is required when resourceType
                                    is Foundry
                                  rule: self.resourceType != 'Foundry' || has(self.projectName)
                              azureopenai:
                                description: Azure OpenAI provider settings.
                                properties:
                                  apiVersion:
                                    description: |-
                                      The version of the Azure OpenAI API to use.
                                      For more information, see the [Azure OpenAI API version reference](https://learn.microsoft.com/en-us/azure/foundry/openai/reference).
                                      If unset, defaults to `v1`.
                                    maxLength: 64
                                    minLength: 1
                                    type: string
                                  deploymentName:
                                    description: |-
                                      The name of the Azure OpenAI model deployment to use.
                                      For more information, see the [Azure OpenAI model docs](https://learn.microsoft.com/en-us/azure/foundry/foundry-models/concepts/models-sold-directly-by-azure?view=foundry-classic).
                                      This is required if `apiVersion` is not `v1`. For `v1`, the model can be
                                      set in the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                  endpoint:
                                    description: |-
                                      The endpoint for the Azure OpenAI API to use, such as `my-endpoint.openai.azure.com`.
                                      If the scheme is included, it is stripped.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                required:
                                - endpoint
                                type: object
                                x-kubernetes-validations:
                                - message: deploymentName is required for this apiVersion
                                  rule: '!has(self.apiVersion) || self.apiVersion
                                    == ''v1'' ? true : has(self.deploymentName)'
                              bedrock:
                                description: Bedrock provider settings.
                                properties:
                                  guardrail:
                                    description: |-
                                      Guardrail policy to use for the backend. See
                                      <https://docs.aws.amazon.com/bedrock/latest/userguide/guardrails.html>.
                                      If not specified, the AWS Guardrail policy will not be used.
                                    properties:
                                      identifier:
                                        description: Identifier of the Guardrail policy
                                          to use for the backend.
                                        maxLength: 256
                                        minLength: 1
                                        type: string
                                      version:
                                        description: Version of the Guardrail policy
                                          to use for the backend.
                                        maxLength: 256
                                        minLength: 1
                                        type: string
                                    required:
                                    - identifier
                                    - version
                                    type: object
                                  model:
                                    description: |-
                                      Model name override, such as `gpt-4o-mini`.
                                      If unset, the model name is taken from the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                  region:
                                    default: us-east-1
                                    description: |-
                                      AWS region to use for the backend.
                                      Defaults to `us-east-1` if not specified.
                                    maxLength: 63
                                    minLength: 1
                                    pattern: ^[a-z0-9-]+$
                                    type: string
                                type: object
                              custom:
                                description: |-
                                  Custom provider configures a non-managed or self-hosted LLM provider.
                                  Use this when the provider target and API formats should be declared
                                  explicitly instead of inferred from a managed provider such as OpenAI or
                                  Anthropic.
                                properties:
                                  backendRef:
                                    description: |-
                                      Kubernetes backend that serves this provider.
                                      `backendRef` may target only a namespace-local Service or InferencePool.
                                      If unset, host and port must be set on the parent provider.
                                    properties:
                                      group:
                                        default: ""
                                        description: |-
                                          API group of the referenced resource. For example, `gateway.networking.k8s.io`.
                                          When unspecified or empty string, core API group is inferred.
                                        maxLength: 253
                                        pattern: ^$|^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                        type: string
                                      kind:
                                        default: Service
                                        description: |-
                                          Kind of the referenced resource. For example, `Service`.
                                          Defaults to "Service" when not specified.
                                        maxLength: 63
                                        minLength: 1
                                        pattern: ^[a-zA-Z]([-a-zA-Z0-9]*[a-zA-Z0-9])?$
                                        type: string
                                      name:
                                        description: Name of the referenced resource.
                                        maxLength: 253
                                        minLength: 1
                                        type: string
                                      port:
                                        description: |-
                                          Destination port number to use for this resource.
                                          Required when the referenced resource is a Kubernetes Service.
                                        format: int32
                                        maximum: 65535
                                        minimum: 1
                                        type: integer
                                    required:
                                    - name
                                    type: object
                                    x-kubernetes-validations:
                                    - message: Must have port for Service reference
                                      rule: '(size(self.group) == 0 && self.kind ==
                                        ''Service'') ? has(self.port) : true'
                                  formats:
                                    description: Provider-native API formats this
                                      provider supports.
                                    items:
                                      description: Provider-native LLM API format
                                        settings.
                                      properties:
                                        path:
                                          description: |-
                                            Default upstream path override for this format.
                                            If unset, agentgateway uses the default path for the format.
                                          maxLength: 1024
                                          minLength: 1
                                          type: string
                                        type:
                                          description: Provider-native API format.
                                          enum:
                                          - AnthropicTokenCount
                                          - Completions
                                          - Embeddings
                                          - Messages
                                          - Realtime
                                          - Rerank
                                          - Responses
                                          type: string
                                      required:
                                      - type
                                      type: object
                                      x-kubernetes-validations:
                                      - message: path must start with /
                                        rule: '!has(self.path) || self.path.startsWith(''/'')'
                                    maxItems: 6
                                    minItems: 1
                                    type: array
                                    x-kubernetes-list-map-keys:
                                    - type
                                    x-kubernetes-list-type: map
                                  model:
                                    description: |-
                                      Model name override, such as `gpt-oss`.
                                      If unset, the model name is taken from the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                required:
                                - formats
                                type: object
                                x-kubernetes-validations:
                                - message: custom provider backendRef may target only
                                    Service or InferencePool
                                  rule: '!has(self.backendRef) || (((!has(self.backendRef.group)
                                    || self.backendRef.group == "") && (!has(self.backendRef.kind)
                                    || self.backendRef.kind == ''Service'')) || (has(self.backendRef.group)
                                    && self.backendRef.group == ''inference.networking.k8s.io''
                                    && has(self.backendRef.kind) && self.backendRef.kind
                                    == ''InferencePool''))'
                              gemini:
                                description: Gemini provider settings.
                                properties:
                                  model:
                                    description: |-
                                      Model name override, such as `gemini-2.5-pro`.
                                      If unset, the model name is taken from the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                type: object
                              host:
                                description: |-
                                  Hostname to send requests to.
                                  For custom providers without backendRef, host and port specify the target.
                                  For managed providers, host and port override the provider default.
                                maxLength: 256
                                minLength: 1
                                type: string
                              name:
                                description: Name of the provider. Policies can target
                                  this provider by name.
                                maxLength: 253
                                minLength: 1
                                pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*$
                                type: string
                              openai:
                                description: OpenAI provider settings.
                                properties:
                                  model:
                                    description: |-
                                      Model name override, such as `gpt-4o-mini`.
                                      If unset, the model name is taken from the request.
                                    maxLength: 256
                                    minLength: 1
                                    type: string
                                type: object
                              path:
                                description: |-
                                  URL path to use for LLM provider API requests.
                                  This is useful when you need to route requests to a different API endpoint while maintaining
                                  compatibility with the original provider's API structure.
                                  If not specified, the default path for the provider is used.
                                maxLength: 1024
                                minLength: 1
                                type: string
                              pathPrefix:
                                description: |-
                                  Overrides the default base path prefix, such as `/v1`, for upstream requests.
                                  Path translation for cross-format requests still applies using this prefix.
                                  Only supported for OpenAI and Anthropic providers.
                                maxLength: 1024
                                minLength: 1
                                type: string
                              policies:
                                description: |-
                                  Policies for communicating with this backend.
                                  Policies may also be set in `AgentgatewayPolicy`, or in the top-level
                                  `AgentgatewayBackend`. Policies are merged on a field-level basis, with
                                  order: `AgentgatewayPolicy` < `AgentgatewayBackend` < `AgentgatewayBackend`
                                  LLM provider (this field).
                                properties:
                                  ai:
                                    description: |-
                                      Settings for AI workloads. This is only applicable when
                                      connecting to a `Backend` of type `ai`.
                                    properties:
                                      defaults:
                                        description: Defaults to merge with user input
                                          fields. If the field is already set, the
                                          field in the request is used.
                                        items:
                                          description: "Default value for a field
                                            in the JSON request body sent to the LLM
                                            provider.\nThese defaults are merged with
                                            the user-provided request to ensure missing
                                            fields are populated.\n\nUser input fields
                                            here refer to the fields in the JSON request
                                            body that a client sends when making a
                                            request to the LLM provider.\nDefaults
                                            set here do _not_ override those user-provided
                                            values unless you explicitly set `override`
                                            to `true`.\n\nExample: Setting a default
                                            system field for Anthropic, which does
                                            not support system role messages:\n\n\tdefaults:\n\t
                                            \ - field: \"system\"\n\t    value: \"answer
                                            all questions in French\"\n\nExample:
                                            Setting a default temperature and overriding
                                            `max_tokens`:\n\n\tdefaults:\n\t  - field:
                                            \"temperature\"\n\t    value: \"0.5\"\n\t
                                            \ - field: \"max_tokens\"\n\t    value:
                                            \"100\"\n\t    override: true\n\nExample:
                                            Setting custom lists fields:\n\n\tdefaults:\n\t
                                            \ - field: \"custom_integer_list\"\n\t
                                            \   value: [1,2,3]\n\n\toverrides:\n\t
                                            \ - field: \"custom_string_list\"\n\t
                                            \   value: [\"one\",\"two\",\"three\"]\n\nNote:
                                            The `field` values correspond to keys
                                            in the JSON request body, not fields in
                                            this CRD."
                                          properties:
                                            field:
                                              allOf:
                                              - minLength: 1
                                              - minLength: 1
                                              description: Name of the field.
                                              maxLength: 256
                                              type: string
                                            value:
                                              description: Default value for the field.
                                                This can be any JSON data type.
                                              x-kubernetes-preserve-unknown-fields: true
                                          required:
                                          - field
                                          - value
                                          type: object
                                        maxItems: 64
                                        minItems: 1
                                        type: array
                                      modelAliases:
                                        additionalProperties:
                                          type: string
                                        description: |-
                                          Maps friendly model names to actual provider model names.
                                          Example: `{"fast": "gpt-3.5-turbo", "smart": "gpt-4-turbo"}`.
                                          Note: This field is only applicable when using the agentgateway data plane.
                                        maxProperties: 64
                                        type: object
                                      overrides:
                                        description: Overrides to merge with user
                                          input fields. If the field is already set,
                                          the field is overwritten.
                                        items:
                                          description: "Default value for a field
                                            in the JSON request body sent to the LLM
                                            provider.\nThese defaults are merged with
                                            the user-provided request to ensure missing
                                            fields are populated.\n\nUser input fields
                                            here refer to the fields in the JSON request
                                            body that a client sends when making a
                                            request to the LLM provider.\nDefaults
                                            set here do _not_ override those user-provided
                                            values unless you explicitly set `override`
                                            to `true`.\n\nExample: Setting a default
                                            system field for Anthropic, which does
                                            not support system role messages:\n\n\tdefaults:\n\t
                                            \ - field: \"system\"\n\t    value: \"answer
                                            all questions in French\"\n\nExample:
                                            Setting a default temperature and overriding
                                            `max_tokens`:\n\n\tdefaults:\n\t  - field:
                                            \"temperature\"\n\t    value: \"0.5\"\n\t
                                            \ - field: \"max_tokens\"\n\t    value:
                                            \"100\"\n\t    override: true\n\nExample:
                                            Setting custom lists fields:\n\n\tdefaults:\n\t
                                            \ - field: \"custom_integer_list\"\n\t
                                            \   value: [1,2,3]\n\n\toverrides:\n\t
                                            \ - field: \"custom_string_list\"\n\t
                                            \   value: [\"one\",\"two\",\"three\"]\n\nNote:
                                            The `field` values correspond to keys
                                            in the JSON request body, not fields in
                                            this CRD."
                                          properties:
                                            field:
                                              allOf:
                                              - minLength: 1
                                              - minLength: 1
                                              description: Name of the field.
                                              maxLength: 256
                                              type: string
                                            value:
                                              description: Default value for the field.
                                                This can be any JSON data type.
                                              x-kubernetes-preserve-unknown-fields: true
                                          required:
                                          - field
                                          - value
                                          type: object
                                        maxItems: 64
                                        minItems: 1
                                        type: array
                                      prompt:
                                        description: |-
                                          Enriches requests sent to the LLM provider by appending and prepending system prompts. This can be configured only for
                                          LLM providers that use the `CHAT` or `CHAT_STREAMING` API route type.
                                        properties:
                                          append:
                                            description: Messages to append to the
                                              prompt sent by the client.
                                            items:
                                              description: An entry for a message
                                                to prepend or append to each prompt.
                                              properties:
                                                content:
                                                  description: String content of the
                                                    message.
                                                  type: string
                                                role:
                                                  description: |-
                                                    Role of the message. The available roles depend on the backend
                                                    LLM provider model, such as `SYSTEM` or `USER` in the OpenAI API.
                                                  type: string
                                              required:
                                              - content
                                              - role
                                              type: object
                                            type: array
                                          prepend:
                                            description: Messages to prepend to the
                                              prompt sent by the client.
                                            items:
                                              description: An entry for a message
                                                to prepend or append to each prompt.
                                              properties:
                                                content:
                                                  description: String content of the
                                                    message.
                                                  type: string
                                                role:
                                                  description: |-
                                                    Role of the message. The available roles depend on the backend
                                                    LLM provider model, such as `SYSTEM` or `USER` in the OpenAI API.
                                                  type: string
                                              required:
                                              - content
                                              - role
                                              type: object
                                            type: array
                                        type: object
                                      promptCaching:
                                        description: |-
                                          Automatic prompt caching for supported
                                          providers, currently AWS Bedrock.
                                          Reduces API costs by caching static content like system prompts and tool definitions.
                                          Only applicable for Bedrock Claude 3+ and Nova models.
                                        properties:
                                          cacheMessageOffset:
                                            default: 0
                                            description: |-
                                              Shifts the message cache point further back in the
                                              conversation. 0 (default) places it at the second-to-last message.
                                              Higher values move it N additional messages towards the start, clamped
                                              to bounds.
                                            minimum: 0
                                            type: integer
                                          cacheMessages:
                                            default: true
                                            description: |-
                                              Enables caching for conversation messages.
                                              Caches all messages in the conversation for cost savings.
                                            type: boolean
                                          cacheSystem:
                                            default: true
                                            description: |-
                                              Enables caching for system prompts.
                                              Inserts a cache point after all system messages.
                                            type: boolean
                                          cacheTools:
                                            default: false
                                            description: |-
                                              Enables caching for tool definitions.
                                              Inserts a cache point after all tool specifications.
                                            type: boolean
                                          minTokens:
                                            default: 1024
                                            description: |-
                                              Minimum estimated token count
                                              before caching is enabled. Uses rough heuristic (word count × 1.3) to estimate tokens.
                                              Bedrock requires at least 1,024 tokens for caching to be effective.
                                            minimum: 0
                                            type: integer
                                        type: object
                                      promptGuard:
                                        description: Guardrails for LLM requests and
                                          responses.
                                        properties:
                                          request:
                                            description: Prompt guards to apply to
                                              requests sent by the client.
                                            items:
                                              description: Prompt guards to apply
                                                to requests sent by the client.
                                              properties:
                                                bedrockGuardrails:
                                                  description: |-
                                                    AWS Bedrock Guardrails settings for prompt
                                                    guarding.
                                                  properties:
                                                    identifier:
                                                      description: Identifier of the
                                                        Guardrail policy to use for
                                                        the backend.
                                                      maxLength: 256
                                                      minLength: 1
                                                      type: string
                                                    policies:
                                                      description: Policies for communicating
                                                        with AWS Bedrock Guardrails.
                                                      properties:
                                                        auth:
                                                          description: Settings for
                                                            managing authentication
                                                            to the backend.
                                                          properties:
                                                            aws:
                                                              description: |-
                                                                Explicit AWS authentication method for the backend.
                                                                When omitted, default AWS SDK credential discovery is used.
                                                              properties:
                                                                assumeRole:
                                                                  description: |-
                                                                    AWS STS AssumeRole settings to use before signing backend requests.
                                                                    Ambient AWS credentials are used as the source credentials for STS.
                                                                  properties:
                                                                    roleArn:
                                                                      description: AWS
                                                                        IAM role ARN
                                                                        to assume.
                                                                      minLength: 1
                                                                      pattern: ^arn:aws[a-z-]*:iam::[0-9]{12}:role/.+$
                                                                      type: string
                                                                  required:
                                                                  - roleArn
                                                                  type: object
                                                                secretRef:
                                                                  description: |-
                                                                    Credential source, defaulting to a Kubernetes
                                                                    `Secret`, containing the AWS credentials. When using the default Secret
                                                                    resolver, the `Secret` must have keys `accessKey`, `secretKey`, and
                                                                    optionally `sessionToken`.
                                                                  properties:
                                                                    group:
                                                                      description: |-
                                                                        The API group of the referenced credential.
                                                                        Empty selects the core API group.
                                                                      type: string
                                                                    kind:
                                                                      description: |-
                                                                        The kind of the referenced credential.
                                                                        Empty defaults to `Secret`.
                                                                      type: string
                                                                    name:
                                                                      description: The
                                                                        name of the
                                                                        referenced
                                                                        credential.
                                                                      maxLength: 253
                                                                      minLength: 1
                                                                      type: string
                                                                  required:
                                                                  - name
                                                                  type: object
                                                                  x-kubernetes-map-type: atomic
                                                                  x-kubernetes-validations:
                                                                  - message: custom
                                                                      credential refs
                                                                      must set both
                                                                      group and kind
                                                                    rule: '(!has(self.group)
                                                                      || size(self.group)
                                                                      == 0) ? (!has(self.kind)
                                                                      || size(self.kind)
                                                                      == 0 || self.kind
                                                                      == ''Secret'')
                                                                      : (has(self.kind)
                                                                      && size(self.kind)
                                                                      > 0)'
                                                                serviceName:
                                                                  description: |-
                                                                    AWS SigV4 signing service name, for example
                                                                    `bedrock`, `bedrock-agentcore`, or `execute-api`). If unset, typed AWS
                                                                    backends may provide this automatically.
                                                                  maxLength: 256
                                                                  minLength: 1
                                                                  type: string
                                                              type: object
                                                              x-kubernetes-validations:
                                                              - message: secretRef
                                                                  and assumeRole are
                                                                  mutually exclusive
                                                                rule: '!(has(self.secretRef)
                                                                  && has(self.assumeRole))'
                                                            azure:
                                                              description: Azure authentication
                                                                method for the backend.
                                                              properties:
                                                                managedIdentity:
                                                                  description: Managed
                                                                    identity authentication
                                                                    settings.
                                                                  properties:
                                                                    clientId:
                                                                      type: string
                                                                    objectId:
                                                                      type: string
                                                                    resourceId:
                                                                      type: string
