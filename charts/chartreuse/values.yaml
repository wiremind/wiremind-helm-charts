# Default values for chartreuse.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

image:
  ## Change me to a real image from a tag containing chartreuse python package and your migration code
  repository: overrideme
  ## Change me to a real image from a tag
  tag: latest
  pullPolicy: IfNotPresent
  ## Note: singular, this is a string and allows a single secret
  pullSecret: ""

## Wether to run schema upgrade before deployment or after deployment
## Note that in case of initial deployment ("install" in helm dialect), chartreuse will be run during deployment as a normal job
upgradeBeforeDeployment: false

## Whether or not to scale down deployments with ExpectedDeploymentScale before migrating (if migration is needed)
stopPods: true

## Whether to run a post-deployment (ArgoCD PostSync) Job restoring the Deployments that the
## migration stopped and that the deployment itself could not scale back up. Without it,
## HPA-managed Deployments (which omit spec.replicas in their chart) stay stranded at 0
## replicas after every upgrade-before-deployment migration: an HPA whose target is at 0
## replicas with minReplicas >= 1 is ScalingDisabled and never recovers on its own.
## Only effective with upgradeBeforeDeployment + stopPods + deploymentMethod argocd.
restorePods: true

## Additional environment variables injected within chartreuse Pods
additionalEnvironmentVariables: {}

# Extra volumes
extraVolumes: []
# - name: thevolume
#   emptyDir:
#     medium: Memory

## Extra volumes to mount
extraVolumeMounts: []
# - name: thevolume
#   mountPath: /tmp/something

## In the case of having multiple upgradeJobs of multiple Chartreuses running, this will allow
## to control the order of their execution, they are executed in weighted order.
## Make sure the weights are > 0
upgradeJobWeight: "1"

alembic:
  enabled: true
  ## If you want to use External Secrets Operator to fetch the database credentials
  externalSecrets:
    refreshInterval: "99999h"   # effectively disables refreshes
    storeRef:
      name: "my-cluster-secret-store"
      kind: ClusterSecretStore
  database_list:
    # postgresql:
    #   databaseType: postgresql
    #   dialect: postgresql
    #   port: 5432
    #   user: cache_user
    #   passwordRemoteRefKey: "my-dummy-postgresql-password-remote-ref-key"
    #   host: localhost
    #   database: cache_db
    # clickhouse:
    #   databaseType: clickhouse
    #   dialect: clickhouse
    #   user: user
    #   port: 8123
    #   passwordRemoteRefKey: "my-dummy-clickhouse-password-remote-ref-key"
    #   host: localhost
    #   database: db
  allowMigrationFromEmptyDatabase: true
  ## like "-x env_type=staging"
  additionalParameters: ""
  directoryPath: "/app/alembic"
  configPath: "alembic.ini"

## The entry point to use. Unless you want to re-use chartreuse as library in your code
## you have no reason to edit it.
entrypoint: "chartreuse-upgrade"

## Entry point of the post-deployment restore Job (see restorePods).
restoreEntrypoint: "chartreuse-restore"

rbac:
  create: true

serviceAccount:
  create: true
  name:

priorityClassName: ""

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

podAnnotations: {}

## Deployment surface. `helm` (default) keeps existing Helm install/upgrade
## hook semantics. `argocd` renders the migration Job as an ArgoCD Sync hook
## with delete-and-recreate (fixing the immutable Job.spec.template error on
## image bumps) and skips the `-ephemeral` upgrade-hook resource set entirely
## (the Helm-only mechanism for pre-upgrade migrations). Matches the umbrella
## wiremind chart and overwhelm's `--cd-version` derivation so the same toggle
## propagates end-to-end.
deploymentMethod: helm

argocd:
  ## Used only when `deploymentMethod: argocd`.
  ## Sync-wave for the chartreuse Job. Consumers should place their app Deployments
  ## at a higher wave (default 0) and their database resources at a lower wave so
  ## ordering is DB -> chartreuse -> app.
  ## The Job's own dependencies (ServiceAccount, ConfigMap, RBAC, ExternalSecret)
  ## are automatically placed one wave earlier (`syncWave - 1`) so they exist before
  ## the Job hook runs.
  syncWave: -50
  ## Sync-wave for the chartreuse-config ExternalSecret specifically. Defaults to the
  ## dependency wave (`syncWave - 1`). Override this to an umbrella's early "secrets"
  ## wave (well before the Job) when a shared force-sync refresh Job is responsible for
  ## re-pulling it at deploy time — that path also requires `refreshPolicy: OnChange`,
  ## which this chart sets automatically in ArgoCD mode. null = use `syncWave - 1`.
  externalSecretSyncWave: null
