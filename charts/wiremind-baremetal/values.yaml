image:
  name: "alpine"
  tag: ""

secret:
  create: true
  existingSecret: ""
  content:
    password: "setthisvalue"

extraEnv: []

# Space-separated md device candidates checked in order.
# We /dev/md127 because we did a mistake on creating /dev/md/md0_0 instead of /dev/md/md0 
# with symbolic link: /dev/md/md0_0 -> ../md127)
raidDevice: "/dev/md/md0 /dev/md127"

tolerations: []

affinity: {}

nodeSelector: {}

priorityClassName: ""

resources: {}

containerSecurityContext:
  privileged: true

livenessProbe:
  exec:
    command:
      - sh
      - "-c"
      # Has this file been updated less than 1 minute ago?
      - find /tmp/raidLivenessFile -mmin -1 | grep /tmp/raidLivenessFile
  initialDelaySeconds: 30
  periodSeconds: 120
  timeoutSeconds: 30
  failureThreshold: 1

readinessProbe: {}

terminationGracePeriodSeconds: 0

hostPID: true
