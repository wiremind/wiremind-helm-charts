{{- if .Values.networkPolicy.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "openstack-exporter.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "openstack-exporter.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "openstack-exporter.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    {{- if .Values.networkPolicy.egressRules }}
    - Egress
    {{- end }}
  ingress:
    # Allow metrics scraping
    - ports:
        - port: {{ .Values.service.port }}
          protocol: TCP
      {{- if not .Values.networkPolicy.allowExternal }}
      from:
        - podSelector:
            matchLabels:
              {{ include "openstack-exporter.fullname" . }}-client: "true"
      {{- end }}
    {{- with .Values.networkPolicy.ingressRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.networkPolicy.egressRules }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
