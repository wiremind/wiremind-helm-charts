---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  labels:
    app: agentgateway
    app.kubernetes.io/name: agentgateway
    gateway.networking.k8s.io/policy: Direct
  name: agentgatewaypolicies.agentgateway.dev
spec:
  group: agentgateway.dev
  names:
    categories:
    - agentgateway
    kind: AgentgatewayPolicy
    listKind: AgentgatewayPolicyList
    plural: agentgatewaypolicies
    shortNames:
    - agpol
    singular: agentgatewaypolicy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: Agentgateway policy acceptance status
      jsonPath: .status.ancestors[*].conditions[?(@.type=='Accepted')].status
      name: Accepted
      type: string
    - description: Agentgateway policy attachment status
      jsonPath: .status.ancestors[*].conditions[?(@.type=='Attached')].status
      name: Attached
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: Desired policy configuration.
            properties:
              backend:
                description: |-
                  Settings for how to connect to destination backends.

                  A backend policy can target a `Gateway` (optionally, with a
                  `sectionName` indicating the listener), `ListenerSet`, `Route`
                  (optionally, with a `sectionName` indicating the route rule), or a
                  `Service` or `Backend` (optionally, with a `sectionName` indicating the
                  port for `Service`, or sub-backend for `Backend`).

                  Note that a backend policy applies when connecting to a specific destination backend. Targeting a higher level
                  resource, like `Gateway`, is just a way to easily apply a policy to a
                  group of backends.

                  When multiple policies are selected for a given request, they are merged on a field-level basis, but not a deep
                  merge. Precedence is given to more precise policies: `Gateway` <
                  `Listener` < `Route` < `Route Rule` < `Backend` or `Service`. For
                  example, if a `Gateway` policy sets `tcp` and `tls`, and a `Backend`
                  policy sets `tls`, the effective policy would be `tcp` from the
                  `Gateway`, and `tls` from the `Backend`.
                properties:
                  ai:
                    description: |-
                      Settings for AI workloads. This is only applicable when
                      connecting to a `Backend` of type `ai`.
                    properties:
                      defaults:
                        description: Defaults to merge with user input fields. If
                          the field is already set, the field in the request is used.
                        items:
                          description: "Default value for a field in the JSON request
                            body sent to the LLM provider.\nThese defaults are merged
                            with the user-provided request to ensure missing fields
                            are populated.\n\nUser input fields here refer to the
                            fields in the JSON request body that a client sends when
                            making a request to the LLM provider.\nDefaults set here
                            do _not_ override those user-provided values unless you
                            explicitly set `override` to `true`.\n\nExample: Setting
                            a default system field for Anthropic, which does not support
                            system role messages:\n\n\tdefaults:\n\t  - field: \"system\"\n\t
                            \   value: \"answer all questions in French\"\n\nExample:
                            Setting a default temperature and overriding `max_tokens`:\n\n\tdefaults:\n\t
                            \ - field: \"temperature\"\n\t    value: \"0.5\"\n\t  -
                            field: \"max_tokens\"\n\t    value: \"100\"\n\t    override:
                            true\n\nExample: Setting custom lists fields:\n\n\tdefaults:\n\t
                            \ - field: \"custom_integer_list\"\n\t    value: [1,2,3]\n\n\toverrides:\n\t
                            \ - field: \"custom_string_list\"\n\t    value: [\"one\",\"two\",\"three\"]\n\nNote:
                            The `field` values correspond to keys in the JSON request
                            body, not fields in this CRD."
                          properties:
                            field:
                              allOf:
                              - minLength: 1
                              - minLength: 1
                              description: Name of the field.
                              maxLength: 256
                              type: string
                            value:
                              description: Default value for the field. This can be
                                any JSON data type.
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - field
                          - value
                          type: object
                        maxItems: 64
                        minItems: 1
                        type: array
                      modelAliases:
                        additionalProperties:
                          type: string
                        description: |-
                          Maps friendly model names to actual provider model names.
                          Example: `{"fast": "gpt-3.5-turbo", "smart": "gpt-4-turbo"}`.
                          Note: This field is only applicable when using the agentgateway data plane.
                        maxProperties: 64
                        type: object
                      overrides:
                        description: Overrides to merge with user input fields. If
                          the field is already set, the field is overwritten.
                        items:
                          description: "Default value for a field in the JSON request
                            body sent to the LLM provider.\nThese defaults are merged
                            with the user-provided request to ensure missing fields
                            are populated.\n\nUser input fields here refer to the
                            fields in the JSON request body that a client sends when
                            making a request to the LLM provider.\nDefaults set here
                            do _not_ override those user-provided values unless you
                            explicitly set `override` to `true`.\n\nExample: Setting
                            a default system field for Anthropic, which does not support
                            system role messages:\n\n\tdefaults:\n\t  - field: \"system\"\n\t
                            \   value: \"answer all questions in French\"\n\nExample:
                            Setting a default temperature and overriding `max_tokens`:\n\n\tdefaults:\n\t
                            \ - field: \"temperature\"\n\t    value: \"0.5\"\n\t  -
                            field: \"max_tokens\"\n\t    value: \"100\"\n\t    override:
                            true\n\nExample: Setting custom lists fields:\n\n\tdefaults:\n\t
                            \ - field: \"custom_integer_list\"\n\t    value: [1,2,3]\n\n\toverrides:\n\t
                            \ - field: \"custom_string_list\"\n\t    value: [\"one\",\"two\",\"three\"]\n\nNote:
                            The `field` values correspond to keys in the JSON request
                            body, not fields in this CRD."
                          properties:
                            field:
                              allOf:
                              - minLength: 1
                              - minLength: 1
                              description: Name of the field.
                              maxLength: 256
                              type: string
                            value:
                              description: Default value for the field. This can be
                                any JSON data type.
                              x-kubernetes-preserve-unknown-fields: true
                          required:
                          - field
                          - value
                          type: object
                        maxItems: 64
                        minItems: 1
                        type: array
                      prompt:
                        description: |-
                          Enriches requests sent to the LLM provider by appending and prepending system prompts. This can be configured only for
                          LLM providers that use the `CHAT` or `CHAT_STREAMING` API route type.
                        properties:
                          append:
                            description: Messages to append to the prompt sent by
                              the client.
                            items:
                              description: An entry for a message to prepend or append
                                to each prompt.
                              properties:
                                content:
                                  description: String content of the message.
                                  type: string
                                role:
                                  description: |-
                                    Role of the message. The available roles depend on the backend
                                    LLM provider model, such as `SYSTEM` or `USER` in the OpenAI API.
                                  type: string
                              required:
                              - content
                              - role
                              type: object
                            type: array
                          prepend:
                            description: Messages to prepend to the prompt sent by
                              the client.
                            items:
                              description: An entry for a message to prepend or append
                                to each prompt.
                              properties:
                                content:
                                  description: String content of the message.
                                  type: string
                                role:
                                  description: |-
                                    Role of the message. The available roles depend on the backend
                                    LLM provider model, such as `SYSTEM` or `USER` in the OpenAI API.
                                  type: string
                              required:
                              - content
                              - role
                              type: object
                            type: array
                        type: object
                      promptCaching:
                        description: |-
                          Automatic prompt caching for supported
                          providers, currently AWS Bedrock.
                          Reduces API costs by caching static content like system prompts and tool definitions.
                          Only applicable for Bedrock Claude 3+ and Nova models.
                        properties:
                          cacheMessageOffset:
                            default: 0
                            description: |-
                              Shifts the message cache point further back in the
                              conversation. 0 (default) places it at the second-to-last message.
                              Higher values move it N additional messages towards the start, clamped
                              to bounds.
                            minimum: 0
                            type: integer
                          cacheMessages:
                            default: true
                            description: |-
                              Enables caching for conversation messages.
                              Caches all messages in the conversation for cost savings.
                            type: boolean
                          cacheSystem:
                            default: true
                            description: |-
                              Enables caching for system prompts.
                              Inserts a cache point after all system messages.
                            type: boolean
                          cacheTools:
                            default: false
                            description: |-
                              Enables caching for tool definitions.
                              Inserts a cache point after all tool specifications.
                            type: boolean
                          minTokens:
                            default: 1024
                            description: |-
                              Minimum estimated token count
                              before caching is enabled. Uses rough heuristic (word count × 1.3) to estimate tokens.
                              Bedrock requires at least 1,024 tokens for caching to be effective.
                            minimum: 0
                            type: integer
                        type: object
                      promptGuard:
                        description: Guardrails for LLM requests and responses.
                        properties:
                          request:
                            description: Prompt guards to apply to requests sent by
                              the client.
                            items:
                              description: Prompt guards to apply to requests sent
                                by the client.
                              properties:
                                bedrockGuardrails:
                                  description: |-
                                    AWS Bedrock Guardrails settings for prompt
                                    guarding.
                                  properties:
                                    identifier:
                                      description: Identifier of the Guardrail policy
                                        to use for the backend.
                                      maxLength: 256
                                      minLength: 1
                                      type: string
                                    policies:
                                      description: Policies for communicating with
                                        AWS Bedrock Guardrails.
                                      properties:
                                        auth:
                                          description: Settings for managing authentication
                                            to the backend.
                                          properties:
                                            aws:
                                              description: |-
                                                Explicit AWS authentication method for the backend.
                                                When omitted, default AWS SDK credential discovery is used.
                                              properties:
                                                assumeRole:
                                                  description: |-
                                                    AWS STS AssumeRole settings to use before signing backend requests.
                                                    Ambient AWS credentials are used as the source credentials for STS.
                                                  properties:
                                                    roleArn:
                                                      description: AWS IAM role ARN
                                                        to assume.
                                                      minLength: 1
                                                      pattern: ^arn:aws[a-z-]*:iam::[0-9]{12}:role/.+$
                                                      type: string
                                                  required:
                                                  - roleArn
                                                  type: object
                                                secretRef:
                                                  description: |-
                                                    Credential source, defaulting to a Kubernetes
                                                    `Secret`, containing the AWS credentials. When using the default Secret
                                                    resolver, the `Secret` must have keys `accessKey`, `secretKey`, and
                                                    optionally `sessionToken`.
                                                  properties:
                                                    group:
                                                      description: |-
                                                        The API group of the referenced credential.
                                                        Empty selects the core API group.
                                                      type: string
                                                    kind:
                                                      description: |-
                                                        The kind of the referenced credential.
                                                        Empty defaults to `Secret`.
                                                      type: string
                                                    name:
                                                      description: The name of the
                                                        referenced credential.
                                                      maxLength: 253
                                                      minLength: 1
                                                      type: string
                                                  required:
                                                  - name
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                  x-kubernetes-validations:
                                                  - message: custom credential refs
                                                      must set both group and kind
                                                    rule: '(!has(self.group) || size(self.group)
                                                      == 0) ? (!has(self.kind) ||
                                                      size(self.kind) == 0 || self.kind
                                                      == ''Secret'') : (has(self.kind)
                                                      && size(self.kind) > 0)'
                                                serviceName:
                                                  description: |-
                                                    AWS SigV4 signing service name, for example
                                                    `bedrock`, `bedrock-agentcore`, or `execute-api`). If unset, typed AWS
                                                    backends may provide this automatically.
                                                  maxLength: 256
                                                  minLength: 1
                                                  type: string
                                              type: object
                                              x-kubernetes-validations:
                                              - message: secretRef and assumeRole
                                                  are mutually exclusive
                                                rule: '!(has(self.secretRef) && has(self.assumeRole))'
                                            azure:
                                              description: Azure authentication method
                                                for the backend.
                                              properties:
                                                managedIdentity:
                                                  description: Managed identity authentication
                                                    settings.
                                                  properties:
                                                    clientId:
                                                      type: string
                                                    objectId:
                                                      type: string
                                                    resourceId:
                                                      type: string
                                                  required:
                                                  - clientId
                                                  - objectId
                                                  - resourceId
                                                  type: object
                                                secretRef:
                                                  description: |-
                                                    Credential source, defaulting to a Kubernetes
                                                    `Secret`, containing the Azure credentials. When using the default Secret
                                                    resolver, the `Secret` must have keys `clientID`, `tenantID`, and
                                                    `clientSecret`.
                                                  properties:
                                                    group:
                                                      description: |-
                                                        The API group of the referenced credential.
                                                        Empty selects the core API group.
                                                      type: string
                                                    kind:
                                                      description: |-
                                                        The kind of the referenced credential.
                                                        Empty defaults to `Secret`.
                                                      type: string
                                                    name:
                                                      description: The name of the
                                                        referenced credential.
                                                      maxLength: 253
                                                      minLength: 1
                                                      type: string
                                                  required:
                                                  - name
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                  x-kubernetes-validations:
                                                  - message: custom credential refs
                                                      must set both group and kind
                                                    rule: '(!has(self.group) || size(self.group)
                                                      == 0) ? (!has(self.kind) ||
                                                      size(self.kind) == 0 || self.kind
                                                      == ''Secret'') : (has(self.kind)
                                                      && size(self.kind) > 0)'
                                              type: object
                                            gcp:
                                              description: |-
                                                Google authentication method for the backend.
                                                When omitted, default Google credential discovery is used.
                                              properties:
                                                audience:
                                                  description: |-
                                                    Explicit `aud` value for the ID token. Only
                                                    valid with `IdToken` type. If not set, the `aud` is automatically
                                                    derived from the backend hostname.
                                                  maxLength: 256
                                                  minLength: 1
                                                  type: string
                                                secretRef:
                                                  description: |-
                                                    Credential source, defaulting to a Kubernetes
                                                    `Secret`, containing ADC-compatible Google credential JSON. When using
                                                    the default Secret resolver, this must be stored in the `credentials.json`
                                                    key. When omitted, ambient credentials are used.
                                                  properties:
                                                    group:
                                                      description: |-
                                                        The API group of the referenced credential.
                                                        Empty selects the core API group.
                                                      type: string
                                                    kind:
                                                      description: |-
                                                        The kind of the referenced credential.
                                                        Empty defaults to `Secret`.
                                                      type: string
                                                    name:
                                                      description: The name of the
                                                        referenced credential.
                                                      maxLength: 253
                                                      minLength: 1
                                                      type: string
                                                  required:
                                                  - name
                                                  type: object
                                                  x-kubernetes-map-type: atomic
                                                  x-kubernetes-validations:
                                                  - message: custom credential refs
                                                      must set both group and kind
                                                    rule: '(!has(self.group) || size(self.group)
                                                      == 0) ? (!has(self.kind) ||
                                                      size(self.kind) == 0 || self.kind
                                                      == ''Secret'') : (has(self.kind)
                                                      && size(self.kind) > 0)'
                                                type:
                                                  description: |-
                                                    The type of token to generate. To authenticate to GCP services,
                                                    generally an `AccessToken` is used. To authenticate to Cloud Run, an
                                                    `IdToken` is used.
                                                  enum:
                                                  - AccessToken
                                                  - IdToken
                                                  type: string
                                              type: object
                                              x-kubernetes-validations:
                                              - message: audience is only valid with
                                                  IdToken
                                                rule: 'has(self.audience) ? self.type
                                                  == ''IdToken'' : true'
                                            key:
                                              description: |-
                                                Inline key to use as the value of the
                                                `Authorization` header. This option is the least secure; usage of a
                                                `Secret` is preferred.
                                              maxLength: 2048
                                              type: string
                                            location:
                                              description: |-
                                                Where backend credentials are inserted.
                                                If omitted, credentials are written to the `Authorization` header with the `Bearer ` prefix.
                                                This applies to `key`, `secretRef`, and `passthrough`.
                                              properties:
                                                cookie:
                                                  properties:
                                                    name:
                                                      maxLength: 256
                                                      minLength: 1
                                                      type: string
                                                  required:
                                                  - name
                                                  type: object
                                                header:
                                                  properties:
                                                    name:
                                                      description: |-
                                                        HTTPHeaderName is the name of an HTTP header.

                                                        Valid values include:

                                                        * "Authorization"
                                                        * "Set-Cookie"

                                                        Invalid values include:

                                                          - ":method" - ":" is an invalid character. This means that HTTP/2 pseudo
                                                            headers are not currently supported by this type.
                                                          - "/invalid" - "/ " is an invalid character
                                                      maxLength: 256
                                                      minLength: 1
                                                      pattern: ^[A-Za-z0-9!#$%&'*+\-.^_\x60|~]+$
                                                      type: string
                                                    prefix:
                                                      maxLength: 256
                                                      minLength: 1
                                                      type: string
                                                  required:
                                                  - name
                                                  type: object
                                                queryParameter:
                                                  properties:
                                                    name:
                                                      maxLength: 256
                                                      minLength: 1
                                                      type: string
                                                  required:
                                                  - name
                                                  type: object
                                              type: object
                                              x-kubernetes-validations:
                                              - message: exactly one of the fields
                                                  in [header queryParameter cookie]
                                                  must be set
                                                rule: '[has(self.header),has(self.queryParameter),has(self.cookie)].filter(x,x==true).size()
                                                  == 1'
                                            passthrough:
                                              description: |-
                                                Passes through an existing token that has been sent by the
                                                client and validated. Other policies, like JWT and API key
                                                authentication, will strip the original client credentials. Passthrough backend authentication
                                                causes the original token to be added back into the request. If there are no client authentication policies on the
                                                request, the original token would be unchanged, so this would have no effect.
                                              type: object
                                            secretRef:
                                              description: |-
                                                Credential source, defaulting to a Kubernetes
                                                `Secret`, storing the key to use as the authorization value. When using
                                                the default Secret resolver, this must be stored in the `Authorization`
                                                key.
                                              properties:
                                                group:
                                                  description: |-
                                                    The API group of the referenced credential.
                                                    Empty selects the core API group.
                                                  type: string
                                                kind:
                                                  description: |-
                                                    The kind of the referenced credential.
                                                    Empty defaults to `Secret`.
                                                  type: string
                                                name:
                                                  description: The name of the referenced
                                                    credential.
                                                  maxLength: 253
                                                  minLength: 1
                                                  type: string
                                              required:
                                              - name
                                              type: object
                                              x-kubernetes-map-type: atomic
                                              x-kubernetes-validations:
                                              - message: custom credential refs must
                                                  set both group and kind
                                                rule: '(!has(self.group) || size(self.group)
                                                  == 0) ? (!has(self.kind) || size(self.kind)
                                                  == 0 || self.kind == ''Secret'')
                                                  : (has(self.kind) && size(self.kind)
                                                  > 0)'
                                          type: object
                                          x-kubernetes-validations:
                                          - message: location may only be set for
                                              key or passthrough auth
                                            rule: 'has(self.location) ? has(self.key)
                                              || has(self.secretRef) || has(self.passthrough)
                                              : true'
                                          - message: exactly one of the fields in
                                              [key secretRef passthrough aws azure
                                              gcp] must be set
                                            rule: '[has(self.key),has(self.secretRef),has(self.passthrough),has(self.aws),has(self.azure),has(self.gcp)].filter(x,x==true).size()
                                              == 1'
                                        http:
                                          description: Settings for managing HTTP
                                            requests to the backend.
                                          properties:
                                            requestTimeout:
                                              description: Deadline for receiving
                                                a response from the backend.
                                              type: string
                                              x-kubernetes-validations:
                                              - message: invalid duration value
                                                rule: matches(self, '^([0-9]{1,5}(h|m|s|ms)){1,4}$')
                                              - message: requestTimeout must be at
                                                  least 1ms
                                                rule: duration(self) >= duration('1ms')
                                            version:
                                              description: |-
                                                HTTP protocol version to use when connecting to
                                                the backend.
                                                If not specified, the version is automatically determined:
                                                * `Service` types can specify it with `appProtocol` on the `Service`
                                                  port.
                                                * If traffic is identified as gRPC, `HTTP2` is used.
                                                * If the incoming traffic was plaintext HTTP, the original protocol will
                                                  be used.
                                                * If the incoming traffic was HTTPS, `HTTP1` will be used. This is
                                                  because most clients will transparently upgrade HTTPS traffic to
                                                  `HTTP2`, even if the backend doesn't support it.
                                              enum:
                                              - HTTP1
                                              - HTTP2
                                              type: string
                                          type: object
                                        tcp:
                                          description: Settings for managing TCP connections
                                            to the backend.
                                          properties:
                                            connectTimeout:
                                              description: |-
                                                Deadline for establishing a connection to
                                                the destination.
                                              type: string
                                              x-kubernetes-validations:
                                              - message: invalid duration value
                                                rule: matches(self, '^([0-9]{1,5}(h|m|s|ms)){1,4}$')
                                              - message: connectTimeout must be at
                                                  least 100ms
                                                rule: duration(self) >= duration('100ms')
                                            keepalive:
                                              description: |-
                                                Settings for enabling TCP keepalives on the
                                                connection.
                                              properties:
                                                interval:
                                                  description: |-
                                                    Time between keepalive probes.
                                                    If unset, this defaults to 180s.
                                                  type: string
                                                  x-kubernetes-validations:
                                                  - message: invalid duration value
                                                    rule: matches(self, '^([0-9]{1,5}(h|m|s|ms)){1,4}$')
                                                  - message: interval must be at least
                                                      1 second
                                                    rule: duration(self) >= duration('1s')
                                                retries:
                                                  description: |-
                                                    Maximum number of keepalive probes to send before dropping the connection.
                                                    If unset, this defaults to 9.
                                                  format: int32
                                                  maximum: 64
                                                  minimum: 1
                                                  type: integer
                                                time:
                                                  description: |-
                                                    Time a connection needs to be idle before keepalive probes start being sent.
                                                    If unset, this defaults to 180s.
                                                  type: string
                                                  x-kubernetes-validations:
                                                  - message: invalid duration value
                                                    rule: matches(self, '^([0-9]{1,5}(h|m|s|ms)){1,4}$')
                                                  - message: time must be at least
                                                      1 second
                                                    rule: duration(self) >= duration('1s')
                                              type: object
                                          type: object
                                        tls:
                                          description: |-
                                            Settings for managing TLS connections to the backend.

                                            If this field is set, TLS will be initiated to the backend; the system trusted CA certificates will be used to
                                            validate the server, and the SNI will automatically be set based on the destination.
                                          properties:
                                            alpnProtocols:
                                              description: |-
                                                Application-Layer Protocol Negotiation (`ALPN`)
                                                value to use in the TLS handshake.

                                                If not present, defaults to `["h2", "http/1.1"]`.
                                              items:
                                                maxLength: 64
                                                minLength: 1
                                                type: string
                                              maxItems: 16
                                              minItems: 1
                                              type: array
                                            caCertificateRefs:
                                              description: |-
                                                CA certificate `ConfigMap` to use to
                                                verify the server certificate.
                                                If unset, the system's trusted certificates are used.
                                              items:
                                                description: |-
                                                  LocalObjectReference contains enough information to let you locate the
                                                  referenced object inside the same namespace.
                                                properties:
                                                  name:
                                                    default: ""
                                                    description: |-
                                                      Name of the referent.
                                                      This field is effectively required, but due to backwards compatibility is
