{{- if not .Values.argocd.enabled -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ template "chartreuse.serviceAccountName" . }}-ephemeral
  labels:
    {{- include "chartreuse.labels" . | nindent 4 }}
  annotations:
    {{- include "chartreuse.annotations.ephemeral" . | nindent 4 }}
{{- end -}}
